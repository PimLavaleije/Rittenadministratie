<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inloggen — Rittenadministratie</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f7fa; }
    .login-card { max-width: 380px; margin: 80px auto; }
    .login-header { background: #1F3864; color: #fff; border-radius: .375rem .375rem 0 0; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="card shadow">
    <div class="login-header text-center py-4">
      <i class="bi bi-car-front-fill fs-2"></i>
      <div class="fw-bold mt-1">Rittenadministratie</div>
    </div>
    <div class="card-body p-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Gebruikersnaam</label>
          <input type="text" name="gebruikersnaam" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Wachtwoord</label>
          <input type="password" name="wachtwoord" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>Inloggen
        </button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
